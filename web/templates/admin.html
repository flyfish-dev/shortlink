<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.AppName}} · 管理后台</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/styles.css?v={{.AssetVersion}}">
</head>
<body>
  <div class="shell" id="app" data-base-url="{{.BaseURL}}">
    <aside class="sidebar">
      <div class="brand"><img class="brand-logo" src="/assets/brand.svg" alt=""><strong id="brandName">{{.AppName}}</strong></div>
      <nav>
        <button class="nav active" data-view="dashboard"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 13h7V4H4v9Zm9 7h7v-7h-7v7ZM4 20h7v-5H4v5Zm9-9h7V4h-7v7Z"/></svg></span><span data-i18n="nav.dashboard">总览</span></button>
        <button class="nav" data-view="shorts"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9.4 14.6a3.2 3.2 0 0 1 0-4.5l1.8-1.8a3.2 3.2 0 0 1 4.5 4.5l-.7.7"/><path d="M14.6 9.4a3.2 3.2 0 0 1 0 4.5l-1.8 1.8a3.2 3.2 0 0 1-4.5-4.5l.7-.7"/></svg></span><span data-i18n="nav.shorts">短链</span></button>
        <button class="nav" data-view="lives"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 5h5v5H5V5Zm9 0h5v5h-5V5ZM5 14h5v5H5v-5Zm9 0h2v2h-2v-2Zm4 0h1v5h-5v-1h4v-4Z"/></svg></span><span data-i18n="nav.lives">活码</span></button>
        <button class="nav" data-view="settings"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 7h8"/><path d="M17 7h2"/><path d="M15 5v4"/><path d="M5 17h2"/><path d="M11 17h8"/><path d="M9 15v4"/><path d="M5 12h4"/><path d="M13 12h6"/><path d="M11 10v4"/></svg></span><span data-i18n="nav.settings">系统设置</span></button>
      </nav>
      <div class="side-foot">
        <button class="icon-btn theme-switch" id="themeToggle" type="button" aria-label="切换主题"></button>
        <button class="lang-switch" id="langToggle" type="button" aria-label="切换语言"><span>中文</span><span>EN</span></button>
        <a class="logout-link" href="/auth/logout" data-i18n="common.logout">退出登录</a>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">总览</h1>
          <p id="pageDesc">短链、活码与访问数据一屏掌控。</p>
        </div>
        <div class="top-actions">
          <button class="ghost" id="refreshBtn" data-i18n="common.refresh">刷新</button>
          <button class="primary" id="createBtn">新建</button>
        </div>
      </header>
      <section id="content"></section>
    </main>
  </div>

  <div class="modal" id="modal" hidden>
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="modalTitle">编辑</h2>
        <button class="icon" data-close="1">×</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <template id="loadingTpl"><div class="empty" data-i18n="common.loading">加载中...</div></template>
  <script src="/assets/app.js?v={{.AssetVersion}}" type="module"></script>
</body>
</html>
