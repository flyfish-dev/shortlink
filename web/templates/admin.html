<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.AppName}} · Console</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <div class="shell" id="app" data-base-url="{{.BaseURL}}">
    <aside class="sidebar">
      <div class="brand"><img class="brand-logo" src="/assets/brand.svg" alt=""><strong id="brandName">{{.AppName}}</strong></div>
      <nav>
        <button class="nav active" data-view="dashboard" data-i18n="nav.dashboard">Dashboard</button>
        <button class="nav" data-view="shorts" data-i18n="nav.shorts">Short links</button>
        <button class="nav" data-view="lives" data-i18n="nav.lives">Live QR</button>
        <button class="nav admin-only" data-view="users" data-i18n="nav.users">Users</button>
        <button class="nav admin-only" data-view="settings" data-i18n="nav.settings">Settings</button>
      </nav>
      <div class="side-foot">
        <button class="icon-btn" id="themeToggle" type="button" aria-label="Toggle theme">moon</button>
        <button class="ghost compact-btn" id="langToggle" type="button">中文</button>
        <a class="logout-link" href="/auth/logout" data-i18n="common.logout">Logout</a>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageDesc">Manage links, live QR codes and analytics.</p>
        </div>
        <div class="top-actions">
          <button class="ghost" id="refreshBtn" data-i18n="common.refresh">Refresh</button>
          <button class="primary" id="createBtn">Create</button>
        </div>
      </header>
      <section id="content"></section>
    </main>
  </div>

  <div class="modal" id="modal" hidden>
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="modalTitle">Edit</h2>
        <button class="icon" data-close="1">x</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <template id="loadingTpl"><div class="empty" data-i18n="common.loading">Loading...</div></template>
  <script src="/assets/app.js" type="module"></script>
</body>
</html>
